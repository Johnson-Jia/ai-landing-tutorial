<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bgGlow" cx="85%" cy="15%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="720" fill="url(#bgGlow)"/>
  <g id="cover-header">
    <text x="64" y="72" font-family="'Trebuchet MS','Microsoft YaHei','PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#06B6D4" letter-spacing="4">AI 战略 · 转型汇报 · 2026</text>
    <line x1="64" y1="92" x2="1216" y2="92" stroke="#2563EB" stroke-width="2"/>
  </g>
  <g id="cover-title">
    <text x="64" y="232" font-family="'Trebuchet MS','Microsoft YaHei','PingFang SC',sans-serif" font-size="84" font-weight="bold" fill="#2563EB">AI 战略</text>
    <text x="64" y="328" font-family="'Trebuchet MS','Microsoft YaHei','PingFang SC',sans-serif" font-size="84" font-weight="bold" fill="#2563EB">转型汇报</text>
    <text x="64" y="388" font-family="'Trebuchet MS','Microsoft YaHei','PingFang SC',sans-serif" font-size="32" font-weight="600" fill="#475569">从试点到全员推广的进展与成果</text>
  </g>
  <g id="cover-hero">
    <line x1="860" y1="140" x2="860" y2="500" stroke="#DBE5F0" stroke-width="1"/>
    <text x="890" y="180" font-family="'Trebuchet MS','Microsoft YaHei','PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#06B6D4" letter-spacing="3">已验证成果</text>
    <text x="890" y="300" font-family="Consolas, 'Courier New', monospace" font-size="64" font-weight="bold" fill="#06B6D4">+104%</text>
    <text x="890" y="344" font-family="'Trebuchet MS','Microsoft YaHei','PingFang SC',sans-serif" font-size="32" font-weight="700" fill="#1E293B">人均代码产出</text>
    <text x="890" y="380" font-family="'Trebuchet MS','Microsoft YaHei','PingFang SC',sans-serif" font-size="18" fill="#475569">开发人数 −9% 反而翻倍</text>
    <text x="890" y="408" font-family="'Trebuchet MS','Microsoft YaHei','PingFang SC',sans-serif" font-size="18" fill="#94A3B8">3 个月 · 206 个仓库同比</text>
  </g>
  <g id="cover-cta">
    <line x1="64" y1="556" x2="1216" y2="556" stroke="#DBE5F0" stroke-width="1"/>
    <text x="64" y="622" font-family="'Trebuchet MS','Microsoft YaHei','PingFang SC',sans-serif" font-size="30" font-weight="700" fill="#2563EB">建议批准：从试点扩展到全员推广</text>
  </g>
  <g id="cover-footer">
    <text x="64" y="688" font-family="'Trebuchet MS','Microsoft YaHei','PingFang SC',sans-serif" font-size="16" fill="#94A3B8">致管理层 · 2026.07</text>
    <text x="1216" y="688" text-anchor="end" font-family="'Trebuchet MS','Microsoft YaHei','PingFang SC',sans-serif" font-size="16" fill="#94A3B8">交付能力翻倍 · 成本下降 · 能力升级</text>
  </g>
