<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- header -->
  <g id="cover-header">
    <text x="64" y="72" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="18" font-weight="700" fill="#0B4F9E" letter-spacing="4">AI 战略 · 转型汇报 · 2026</text>
    <line x1="64" y1="92" x2="1216" y2="92" stroke="#0B4F9E" stroke-width="2"/>
  </g>

  <!-- title -->
  <g id="cover-title">
    <text x="64" y="232" font-family="Georgia, SimSun, 'PingFang SC', serif" font-size="84" font-weight="bold" fill="#0B4F9E">AI 战略</text>
    <text x="64" y="328" font-family="Georgia, SimSun, 'PingFang SC', serif" font-size="84" font-weight="bold" fill="#0B4F9E">转型汇报</text>
    <text x="64" y="388" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="32" font-weight="600" fill="#41506B">从试点到全员推广的进展与成果</text>
  </g>

  <!-- hero data hook (right column) -->
  <g id="cover-hero">
    <line x1="860" y1="140" x2="860" y2="500" stroke="#D6E2F0" stroke-width="1"/>
    <text x="890" y="180" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="18" font-weight="700" fill="#0B4F9E" letter-spacing="3">已验证成果</text>
    <text x="890" y="300" font-family="Georgia, SimSun, serif" font-size="64" font-weight="bold" fill="#00A6A6">+104%</text>
    <text x="890" y="344" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="32" font-weight="700" fill="#0F1B2D">人均代码产出</text>
    <text x="890" y="380" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="18" fill="#41506B">开发人数 −9% 反而翻倍</text>
    <text x="890" y="408" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="18" fill="#6B7A92">3 个月 · 206 个仓库同比</text>
  </g>

  <!-- bottom CTA -->
  <g id="cover-cta">
    <line x1="64" y1="556" x2="1216" y2="556" stroke="#D6E2F0" stroke-width="1"/>
    <text x="64" y="622" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="30" font-weight="700" fill="#0B4F9E">建议批准：从试点扩展到全员推广</text>
  </g>

  <!-- footer -->
  <g id="cover-footer">
    <text x="64" y="688" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" fill="#6B7A92">致管理层 · 2026.07</text>
    <text x="1216" y="688" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" fill="#6B7A92">交付能力翻倍 · 成本下降 · 能力升级</text>
  </g>
</svg>
