    <radialGradient id="orbA" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#06B6D4" stop-opacity="0.34" /><stop offset="100%" stop-color="#06B6D4" stop-opacity="0" /></radialGradient>
