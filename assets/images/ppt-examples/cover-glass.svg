  </g>
  <g id="cover-hero">
    <path fill="#FFFFFF" fill-opacity="0.55" stroke="#FFFFFF" stroke-opacity="0.9" stroke-width="1.5" filter="url(#softShadow)" d="M856,130 H1188 A20,20 0 0 1 1208,150 V490 A20,20 0 0 1 1188,510 H856 A20,20 0 0 1 836,490 V150 A20,20 0 0 1 856,130 Z" />
    <text x="866" y="182" font-family="'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#06B6D4" letter-spacing="3">已验证成果</text>
