    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur in="SourceAlpha" stdDeviation="10" /><feOffset dx="0" dy="6" result="ob" /><feFlood flood-color="#4F6EFA" flood-opacity="0.12" result="sc" /><feComposite in="sc" in2="ob" operator="in" result="sh" /><feMerge><feMergeNode in="sh" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
  </defs>
