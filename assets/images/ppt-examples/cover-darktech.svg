    <text x="64" y="328" font-family="'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif" font-size="84" font-weight="bold" fill="#E8F0FB">转型汇报</text>
    <text x="64" y="388" font-family="'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif" font-size="32" font-weight="600" fill="#A8BCD4">从试点到全员推广的进展与成果</text>
  </g>
  <g id="cover-hero">
    <line x1="860" y1="140" x2="860" y2="500" stroke="#243755" stroke-width="1"/>
    <text x="890" y="180" font-family="'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#00E5FF" letter-spacing="3">已验证成果</text>
    <text x="890" y="300" font-family="Consolas, 'Courier New', monospace" font-size="64" font-weight="bold" fill="#00E5FF" filter="url(#accGlow)">+104%</text>
    <text x="890" y="344" font-family="'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif" font-size="32" font-weight="700" fill="#E8F0FB">人均代码产出</text>
    <text x="890" y="380" font-family="'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif" font-size="18" fill="#A8BCD4">开发人数 −9% 反而翻倍</text>
    <text x="890" y="408" font-family="'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif" font-size="18" fill="#6B83A1">3 个月 · 206 个仓库同比</text>
  </g>
  <g id="cover-cta">
