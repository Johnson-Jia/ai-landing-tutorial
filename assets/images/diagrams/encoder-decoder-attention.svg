<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 310" font-family="'PingFang SC','Microsoft YaHei','Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1057cb"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="6" y="6" width="568" height="298" rx="14" fill="#ffffff" stroke="#1057cb" stroke-width="2"/>
  <text x="290" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">编码器 - 解码器 + 注意力机制</text>

  <!-- 编码器隐藏状态分组 -->
  <rect x="38" y="58" width="96" height="186" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="86" y="52" text-anchor="middle" font-size="11" fill="#64748b">编码器隐藏状态</text>
  <rect x="50" y="72"  width="72" height="40" rx="7" fill="#eef4fc" stroke="#1057cb" stroke-width="1.6"/><text x="86" y="97" text-anchor="middle" font-size="13" fill="#0f172a">h₁</text>
  <rect x="50" y="132" width="72" height="40" rx="7" fill="#eef4fc" stroke="#1057cb" stroke-width="1.6"/><text x="86" y="157" text-anchor="middle" font-size="13" fill="#0f172a">h₂</text>
  <rect x="50" y="192" width="72" height="40" rx="7" fill="#eef4fc" stroke="#1057cb" stroke-width="1.6"/><text x="86" y="217" text-anchor="middle" font-size="13" fill="#0f172a">h₃</text>

  <!-- 注意力权重连线（粗细 = 权重大小） -->
  <path d="M 122 92 L 262 134" fill="none" stroke="#f59e0b" stroke-width="2.2" marker-end="url(#arrA)"/>
  <text x="186" y="108" text-anchor="middle" font-size="11" fill="#b45309">α₁ = 0.2</text>
  <path d="M 122 152 L 262 146" fill="none" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrA)"/>
  <text x="186" y="140" text-anchor="middle" font-size="11.5" font-weight="700" fill="#b45309">α₂ = 0.6</text>
  <path d="M 122 212 L 262 158" fill="none" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arrA)"/>
  <text x="186" y="196" text-anchor="middle" font-size="11" fill="#b45309">α₃ = 0.2</text>

  <!-- 加权求和 ⊕ -->
  <circle cx="280" cy="146" r="16" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>
  <text x="280" y="152" text-anchor="middle" font-size="15" font-weight="700" fill="#7c2d12">Σ</text>
  <line x1="296" y1="146" x2="332" y2="146" stroke="#1057cb" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- 上下文向量 c -->
  <rect x="332" y="124" width="92" height="44" rx="7" fill="#fef3c7" stroke="#b45309" stroke-width="1.8"/>
  <text x="378" y="143" text-anchor="middle" font-size="12.5" font-weight="600" fill="#7c2d12">上下文向量</text>
  <text x="378" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">c</text>

  <line x1="424" y1="146" x2="456" y2="146" stroke="#1057cb" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- 解码器单元 -->
  <rect x="456" y="120" width="92" height="52" rx="8" fill="#dbeafe" stroke="#1057cb" stroke-width="1.8"/>
  <text x="502" y="143" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">解码器单元</text>
  <text x="502" y="160" text-anchor="middle" font-size="10.5" fill="#475569">结合 c 与上一步状态</text>

  <!-- 输出 Y -->
  <line x1="502" y1="120" x2="502" y2="86" stroke="#1057cb" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="478" y="56" width="48" height="30" rx="6" fill="#eef4fc" stroke="#1057cb" stroke-width="1.6"/>
  <text x="502" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Y</text>

  <text x="290" y="276" text-anchor="middle" font-size="12" fill="#0f172a">上下文向量 c = α₁·h₁ + α₂·h₂ + α₃·h₃</text>
  <text x="290" y="296" text-anchor="middle" font-size="11" fill="#475569">权重 α 由解码器当前状态与每个编码器状态计算得出（线越粗 = 关注越多）</text>
</svg>
