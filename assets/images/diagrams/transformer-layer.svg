<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 470" font-family="'PingFang SC','Microsoft YaHei','Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1057cb"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- 外框 -->
  <rect x="10" y="10" width="340" height="450" rx="14" fill="#ffffff" stroke="#1057cb" stroke-width="2"/>
  <!-- 标题 -->
  <text x="180" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">单个 Transformer 层</text>

  <!-- 左侧竖排标签 -->
  <text x="42" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#1057cb" transform="rotate(-90 42 230)">编码器 / 解码器层</text>

  <!-- 输入 -->
  <text x="150" y="74" text-anchor="end" font-size="12" fill="#475569">输入</text>
  <line x1="180" y1="60" x2="180" y2="78" stroke="#1057cb" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- 模块1 多头自注意力 -->
  <rect x="100" y="82" width="160" height="46" rx="8" fill="#dbeafe" stroke="#1057cb" stroke-width="1.8"/>
  <text x="180" y="111" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">多头自注意力</text>
  <!-- 注意力 → ⊕1 -->
  <line x1="180" y1="128" x2="180" y2="138" stroke="#1057cb" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ⊕1 -->
  <circle cx="180" cy="156" r="15" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>
  <text x="180" y="162" text-anchor="middle" font-size="18" font-weight="700" fill="#7c2d12">+</text>
  <!-- 残差连接1（从注意力输出绕回 ⊕1） -->
  <path d="M 260 105 H 296 V 156 H 196" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrR)"/>
  <text x="302" y="132" font-size="11" fill="#64748b">残差</text>

  <!-- ⊕1 → 层归一化1 -->
  <line x1="180" y1="171" x2="180" y2="182" stroke="#1057cb" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- 层归一化1 -->
  <rect x="100" y="182" width="160" height="42" rx="8" fill="#eef4fc" stroke="#1057cb" stroke-width="1.8"/>
  <text x="180" y="209" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">层归一化</text>

  <!-- 层归一化1 → 前馈网络 -->
  <line x1="180" y1="224" x2="180" y2="238" stroke="#1057cb" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- 前馈网络 -->
  <rect x="100" y="238" width="160" height="46" rx="8" fill="#dbeafe" stroke="#1057cb" stroke-width="1.8"/>
  <text x="180" y="267" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">前馈网络</text>
  <!-- 前馈网络 → ⊕2 -->
  <line x1="180" y1="284" x2="180" y2="294" stroke="#1057cb" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ⊕2 -->
  <circle cx="180" cy="312" r="15" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>
  <text x="180" y="318" text-anchor="middle" font-size="18" font-weight="700" fill="#7c2d12">+</text>
  <!-- 残差连接2（从层归一化1输出绕回 ⊕2） -->
  <path d="M 260 203 H 308 V 312 H 196" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrR)"/>
  <text x="314" y="260" font-size="11" fill="#64748b">残差</text>

  <!-- ⊕2 → 层归一化2 -->
  <line x1="180" y1="327" x2="180" y2="338" stroke="#1057cb" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- 层归一化2 -->
  <rect x="100" y="338" width="160" height="42" rx="8" fill="#eef4fc" stroke="#1057cb" stroke-width="1.8"/>
  <text x="180" y="365" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">层归一化</text>

  <!-- 输出 -->
  <line x1="180" y1="380" x2="180" y2="412" stroke="#1057cb" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="195" y="424" font-size="12" fill="#475569">输出</text>
</svg>
