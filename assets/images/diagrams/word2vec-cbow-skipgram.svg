<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="'PingFang SC','Microsoft YaHei','Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1057cb"/>
    </marker>
  </defs>

  <rect x="6" y="6" width="548" height="308" rx="14" fill="#ffffff" stroke="#1057cb" stroke-width="2"/>
  <text x="280" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Word2Vec 的两种训练方式</text>
  <line x1="280" y1="48" x2="280" y2="300" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="4 4"/>

  <!-- ============ CBOW ============ -->
  <text x="140" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="#1057cb">CBOW（连续词袋）</text>
  <!-- 4 上下文词输入 -->
  <rect x="34"  y="70" width="56" height="30" rx="6" fill="#eef4fc" stroke="#1057cb" stroke-width="1.5"/><text x="62"  y="90" text-anchor="middle" font-size="13" fill="#0f172a">W₋₂</text>
  <rect x="34"  y="108" width="56" height="30" rx="6" fill="#eef4fc" stroke="#1057cb" stroke-width="1.5"/><text x="62"  y="128" text-anchor="middle" font-size="13" fill="#0f172a">W₋₁</text>
  <rect x="34"  y="146" width="56" height="30" rx="6" fill="#eef4fc" stroke="#1057cb" stroke-width="1.5"/><text x="62"  y="166" text-anchor="middle" font-size="13" fill="#0f172a">W₁</text>
  <rect x="34"  y="184" width="56" height="30" rx="6" fill="#eef4fc" stroke="#1057cb" stroke-width="1.5"/><text x="62"  y="204" text-anchor="middle" font-size="13" fill="#0f172a">W₂</text>
  <text x="62" y="232" text-anchor="middle" font-size="10" fill="#64748b">上下文（输入）</text>
  <!-- 汇入求和 -->
  <path d="M 90 85 H 120 V 142" fill="none" stroke="#1057cb" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M 90 123 H 120" fill="none" stroke="#1057cb" stroke-width="1.6"/>
  <path d="M 90 161 H 120" fill="none" stroke="#1057cb" stroke-width="1.6"/>
  <path d="M 90 199 H 120 V 158" fill="none" stroke="#1057cb" stroke-width="1.6"/>
  <rect x="120" y="142" width="56" height="32" rx="6" fill="#dbeafe" stroke="#1057cb" stroke-width="1.6"/><text x="148" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">求和 Σ</text>
  <line x1="176" y1="158" x2="202" y2="158" stroke="#1057cb" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- 中心词（预测目标） -->
  <rect x="202" y="140" width="56" height="36" rx="6" fill="#fbbf24" stroke="#b45309" stroke-width="1.8"/><text x="230" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">W₀</text>
  <text x="230" y="192" text-anchor="middle" font-size="10" fill="#92400e">中心词（预测）</text>
  <text x="140" y="276" text-anchor="middle" font-size="11.5" fill="#0f172a">用多个上下文词，</text>
  <text x="140" y="293" text-anchor="middle" font-size="11.5" fill="#0f172a">预测中心词</text>

  <!-- ============ Skip-gram ============ -->
  <text x="420" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="#1057cb">Skip-gram</text>
  <!-- 中心词（输入） -->
  <rect x="316" y="140" width="56" height="36" rx="6" fill="#dbeafe" stroke="#1057cb" stroke-width="1.8"/><text x="344" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">W₀</text>
  <text x="344" y="192" text-anchor="middle" font-size="10" fill="#1d4ed8">中心词（输入）</text>
  <line x1="372" y1="158" x2="398" y2="158" stroke="#1057cb" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="398" y="142" width="56" height="32" rx="6" fill="#eef4fc" stroke="#1057cb" stroke-width="1.6"/><text x="426" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">投影</text>
  <!-- 分发到 4 上下文词 -->
  <path d="M 454 158 H 484 V 85" fill="none" stroke="#1057cb" stroke-width="1.6"/>
  <path d="M 484 123" fill="none" stroke="#1057cb" stroke-width="1.6"/>
  <path d="M 484 161" fill="none" stroke="#1057cb" stroke-width="1.6"/>
  <path d="M 484 199" fill="none" stroke="#1057cb" stroke-width="1.6"/>
  <rect x="484" y="70" width="56" height="30" rx="6" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/><text x="512" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">W₋₂</text>
  <rect x="484" y="108" width="56" height="30" rx="6" fill="#fde68a" stroke="#b45309" stroke-width="1.5"/><text x="512" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">W₋₁</text>
  <rect x="484" y="146" width="56" height="30" rx="6" fill="#fde68a" stroke="#b45309" stroke-width="1.5"/><text x="512" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">W₁</text>
  <rect x="484" y="184" width="56" height="30" rx="6" fill="#fde68a" stroke="#b45309" stroke-width="1.5"/><text x="512" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">W₂</text>
  <text x="512" y="232" text-anchor="middle" font-size="10" fill="#92400e">上下文（预测）</text>
  <text x="420" y="276" text-anchor="middle" font-size="11.5" fill="#0f172a">用中心词，</text>
  <text x="420" y="293" text-anchor="middle" font-size="11.5" fill="#0f172a">预测多个上下文词</text>
</svg>
